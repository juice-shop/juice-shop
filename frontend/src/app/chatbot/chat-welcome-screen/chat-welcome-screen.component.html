<div class="welcome-screen">
  <div class="welcome-branding">
    <img src="assets/public/images/JuicyBot.png" alt="JuicyBot" class="welcome-avatar" />
    <h1 class="welcome-title">JuiceShop Assistant</h1>
    <p class="welcome-subtitle">Delivering juice one token at a time</p>
  </div>

  <div class="welcome-input-area">
    <app-chat-input-box [(message)]="message" (messageSent)="messageSent.emit($event)" />

    <div class="suggestions">
      <button class="suggestion-chip" (click)="applySuggestion('What juice would you recommend for a summer party?')">
        <mat-icon>local_drink</mat-icon>
        <span>Get a suggestion</span>
      </button>
      <button class="suggestion-chip" (click)="applySuggestion('I need help with my order')">
        <mat-icon>help_outline</mat-icon>
        <span>Get help</span>
      </button>
    </div>
  </div>

  @if (conversations().length > 0) {
    <div class="history-section">
      <h2 class="history-heading">Recent conversations</h2>
      <div class="history-list">
        @for (conv of conversations(); track conv.id) {
          <button class="history-item" (click)="conversationSelected.emit(conv.id)">
            <div class="history-item-content">
              <span class="history-title">{{ conv.title }}</span>
              <span class="history-date">{{ conv.updatedAt | date:'short' }}</span>
            </div>
            <button class="history-delete" (click)="deleteConversation($event, conv.id)" aria-label="Delete conversation">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </button>
        }
      </div>
    </div>
  }
</div>

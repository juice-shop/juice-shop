<h3 class="section-title">{{'TAB_FIX_IT' | translate}}</h3>
<div class="controls-row">
  <mat-form-field appearance="fill">
    <mat-label translate>LABEL_CORRECT_FIX</mat-label>
    <select matNativeControl (change)="changeFix($event)">
      @for (fix of randomFixes; track fix; let i = $index) {
      <option [value]="i" [selected]="selectedFix === i">Fix {{ i+1 }}</option>
      }
    </select>
  </mat-form-field>
  <mat-checkbox [(ngModel)]="onlyChangedLines" (change)="toggleOnlyChangedLines()" class="changed-lines-toggle">
    {{ 'LABEL_ONLY_CHANGED_LINES' | translate }}
  </mat-checkbox>
</div>
<div class="diff-container">
  <div #diffHost class="diff-host"></div>
</div>
@if (explanation) {
<mat-card appearance="outlined" [class]="resultColor() === 'warn' ? 'warn-notification' : 'accent-notification'">
  <div class="mdc-card">{{explanation}}</div>
</mat-card>
}
<div class="action-row">
  <button mat-stroked-button (click)="checkFix()" [disabled]="alreadySolved() || result === 1" id="fixItSubmitButton">
    <span>{{'BTN_SUBMIT' | translate}}</span>
    <mat-icon [color]="resultColor()">{{ resultIcon() }}</mat-icon>
  </button>
</div>

<coding-challenge-section [title]="'TAB_FIND_IT'" [description]="'DESCRIPTION_FIND_IT'"
  [solved]="alreadySolved() || result === ResultState.Right" [result]="result" [shaking]="shaking"
  [submitDisabled]="alreadySolved() || result === ResultState.Right || selectedLines.length === 0"
  (submitClicked)="checkLines()" (shakingDone)="shaking = false">
  <div id="code-area">
    <div #editorHost class="editor-host"></div>
    @if (showKeyboardHint) {
    <div class="keyboard-hint" aria-hidden="true">{{'KEYBOARD_NAV_HINT' | translate}}</div>
    }
  </div>
  @if (hint) {
  <mat-card notification appearance="outlined" class="primary-notification" aria-live="polite">
    <div class="mdc-card">{{hint}}</div>
  </mat-card>
  }
  @if (result === ResultState.Right || selectedLines.length === 0) {
  <span button-label>{{'BTN_SUBMIT' | translate}}</span>
  } @else {
  <span button-label>{{'BTN_SUBMIT_VULNERABLE_LINES' | translate: { lines: formatSelectedLines() } }}</span>
  }
</coding-challenge-section>

name: "CodeQL Scan"

on:
  push:
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended
        config: |
          paths-ignore:
            - 'data/static/codefixes'
          query-filters:
          - exclude:
               id: js/missing-rate-limiting
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
# 1. Filtra o SARIF mantendo apenas vulnerabilidades reais (ignora métricas do CodeQL que quebram a Xygeni)
# 1. Injeta o nível "warning" em resultados que vieram sem nível explícito do CodeQL
    - name: Higienizar SARIF (Injetar level ausente)
      run: |
          jq '.runs[].results |= map(if .level == null then .level = "warning" else . end)' ${{ runner.workspace }}/results/javascript.sarif > ${{ runner.workspace }}/results/javascript_fixed.sarif

      # 2. Upload com o formato exigido (sast-sarif)
    - name: Importar SARIF para Xygeni
      uses: xygeni/xygeni-action@13c6ed2797df7d85749864e2cbcf09c893f43b23
      with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: report-upload --format sast-sarif --report ${{ runner.workspace }}/results/javascript_fixed.sarif --name "juice-shop-ghas"

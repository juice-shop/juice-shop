name: "CodeQL Scan"

on:
  push:
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended
        config: |
          paths-ignore:
            - 'data/static/codefixes'
          query-filters:
          - exclude:
               id: js/missing-rate-limiting
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
# 1. Reescreve o SARIF injetando severidade em TODAS as ramificações (Driver, Extensions e Results)
    - name: Adequar SARIF do CodeQL (Python Override)
      run: |
          cat << 'EOF' > fix_sarif.py
          import json, sys

          with open(sys.argv[1], "r") as f:
              data = json.load(f)

          def force_severity(item):
              item["severity"] = "high"
              if "properties" not in item:
                  item["properties"] = {}
              item["properties"]["severity"] = "high"

          for run in data.get("runs", []):
              # 1. Injeta no motor principal
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  force_severity(rule)
              
              # 2. Injeta nas extensões (Aqui estava o gap do CodeQL)
              for ext in run.get("tool", {}).get("extensions", []):
                  for rule in ext.get("rules", []):
                      force_severity(rule)
                  
              # 3. Injeta nos resultados e garante o level
              for res in run.get("results", []):
                  force_severity(res)
                  if "level" not in res:
                      res["level"] = "warning"

          with open(sys.argv[2], "w") as f:
              json.dump(data, f)
          EOF
          
          python3 fix_sarif.py ${{ runner.workspace }}/results/javascript.sarif ${{ runner.workspace }}/results/codeql_fixed.sarif

      # 2. Upload explícito via CLI
    - name: Xygeni - Ingerir alertas do CodeQL
      uses: xygeni/xygeni-action@13c6ed2797df7d85749864e2cbcf09c893f43b23
      with:
          command: report-upload --report=${{ runner.workspace }}/results/codeql_fixed.sarif --format sast-sarif --name "juice-shop-ghas"
          token: ${{ secrets.XYGENI_TOKEN }}

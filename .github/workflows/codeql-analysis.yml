name: "CodeQL Scan"

on:
  push:
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended
        config: |
          paths-ignore:
            - 'data/static/codefixes'
          query-filters:
          - exclude:
               id: js/missing-rate-limiting
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      # 1. Higieniza o esquema do arquivo para o parser da Xygeni
# 1. Reescreve o SARIF injetando severidade em todas as camadas possíveis
    - name: Adequar SARIF do CodeQL (Python Override)
      run: |
          cat << 'EOF' > fix_sarif.py
          import json, sys

          with open(sys.argv[1], "r") as f:
              data = json.load(f)

          for run in data.get("runs", []):
              # Injeta nas definições de regras
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  rule.setdefault("properties", {})["severity"] = "high"
                  rule["severity"] = "high"
              
              # Injeta nos alertas encontrados
              for res in run.get("results", []):
                  res.setdefault("properties", {})["severity"] = "high"
                  res["severity"] = "high"

          with open(sys.argv[2], "w") as f:
              json.dump(data, f)
          EOF
          
          python3 fix_sarif.py ${{ runner.workspace }}/results/javascript.sarif ${{ runner.workspace }}/results/codeql_fixed.sarif

      # 2. Upload explícito via CLI
    - name: Xygeni - Ingerir alertas do CodeQL
      uses: xygeni/xygeni-action@13c6ed2797df7d85749864e2cbcf09c893f43b23
      with:
          command: report-upload --report=${{ runner.workspace }}/results/codeql_fixed.sarif --format sast-sarif --name "juice-shop-ghas"
          token: ${{ secrets.XYGENI_TOKEN }}

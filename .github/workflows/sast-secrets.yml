name: SAST and Secrets

on:
  push:
    branches: [master, main, develop]
  pull_request:
  schedule:
    - cron: "25 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install --disable-pip-version-check semgrep

      - name: Determine baseline commit
        id: baseline
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Semgrep scan
        run: |
          mkdir -p reports/semgrep
          if [ -n "${{ steps.baseline.outputs.sha }}" ]; then
            semgrep scan \
              --config p/javascript \
              --config p/nodejs \
              --config p/secrets \
              --exclude node_modules \
              --exclude frontend/node_modules \
              --exclude legacy \
              --baseline-commit "${{ steps.baseline.outputs.sha }}" \
              --sarif \
              --output reports/semgrep/semgrep.sarif \
              --error
          else
            semgrep scan \
              --config p/javascript \
              --config p/nodejs \
              --config p/secrets \
              --exclude node_modules \
              --exclude frontend/node_modules \
              --exclude legacy \
              --sarif \
              --output reports/semgrep/semgrep.sarif \
              --error
          fi

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/semgrep/semgrep.sarif

  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "value=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Gitleaks
        run: |
          mkdir -p reports/gitleaks
          if [ -n "${{ steps.range.outputs.value }}" ]; then
            docker run --rm \
              -v "$PWD:/repo" \
              ghcr.io/gitleaks/gitleaks:latest \
              detect --source /repo \
              --log-opts "${{ steps.range.outputs.value }}" \
              --redact \
              --report-format sarif \
              --report-path /repo/reports/gitleaks/gitleaks.sarif \
              --exit-code 1
          else
            docker run --rm \
              -v "$PWD:/repo" \
              ghcr.io/gitleaks/gitleaks:latest \
              detect --source /repo \
              --no-git \
              --redact \
              --report-format sarif \
              --report-path /repo/reports/gitleaks/gitleaks.sarif \
              --exit-code 0
          fi

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/gitleaks/gitleaks.sarif

  dependency-scan:
    name: Dependency and Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (report only)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: library
          scanners: vuln
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

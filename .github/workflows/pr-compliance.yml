name: 'PR Compliance Check'

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd #v8.0.0
        id: check
        env:
          ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Check if author is a member of the juice-shop org
            try {
              await github.rest.orgs.checkPublicMembershipForUser({
                org: 'juice-shop',
                username: author
              });
              console.log(`${author} is a juice-shop org member, skipping checks.`);
              return;
            } catch (e) {
              console.log(`${author} is not a juice-shop org member, running checks.`);
            }

            const violations = [];
            let spamScore = 0;

            // Fetch files changed in PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // Fetch commits for DCO check
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const body = (pr.body || '').toLowerCase();
            const title = (pr.title || '').toLowerCase();
            const prBody = pr.body || '';

            // Compliance Violation Flags
            const wrongBranch = pr.base.ref === 'master';
            const aiNoContent = prBody.includes('[x] My contribution does not include any AI-generated content');
            const aiWithContent = prBody.includes('[x] My contribution includes AI-generated content, as disclosed below');
            const aiMissing = !aiNoContent && !aiWithContent;
            const affirmationMissing = !prBody.includes('[x] My code follows the [CONTRIBUTING.md]');
            const dcoMissing = commits.some(c => !c.commit.message.includes('Signed-off-by:'));
            const i18nModified = author !== 'bkimminich' && files.some(f => (f.filename.startsWith('frontend/src/assets/i18n/') || f.filename.startsWith('data/static/i18n/')) && !f.filename.endsWith('en.json'));

            // Spam detection model based on recurring indicators in closed spam PRs
            if (title.length <= 5 || /^(update|fix|patch|docs|hi|hello|test|bug fix|typo|lab|homework|fixes|problem)$/i.test(title)) spamScore += 20;
            if (body.length <= 5 || /^(fixed|update|hi|hello|done|check|fix)$/i.test(body) || body === '') spamScore += 20;
            
            // Check for unfilled template placeholders
            if (body.includes('<!-- ✍️-->') || /### description\s+a clear and concise summary/i.test(body)) spamScore += 40;

            // File-specific spam indicator to penalize "fixing" Juice Shop vulnerabilities
            if (files.length === 1 && files[0].filename === 'lib/insecurity.ts') spamScore += 50;
            // Maintainer-managed files are possible targets for low-effort spam or unauthorized edits
            const maintainerFiles = [
              'HALL_OF_FAME.md', 'LICENSE', 'LICENSE.md', 'SECURITY.md', 'CODE_OF_CONDUCT.md',
              'CONTRIBUTING.md', 'crowdin.yaml', 'threat-model.json', 'bom.json', 'AGENTS.md',
              'REFERENCES.md', 'SOLUTIONS.md', 'CODEOWNERS', 'config.schema.yml', 'ctf.key'
            ];
            const maintainerFileCount = files.filter(f => 
              maintainerFiles.includes(f.filename) || 
              f.filename.startsWith('.github/') ||
              f.filename.startsWith('.circleci/')
            ).length;
            
            if (maintainerFileCount > 0) {
              spamScore += 40;
              if (maintainerFileCount > 1) spamScore += 20;
            }
            // Extra penalty for new YAML or dotfiles in root or dotfolders
            if (files.some(f => {
              if (f.status !== 'added') return false;
              const isYaml = f.filename.endsWith('.yml') || f.filename.endsWith('.yaml');
              const isDotFile = f.filename.split('/').pop().startsWith('.');
              const isRoot = !f.filename.includes('/');
              const isInDotFolder = f.filename.startsWith('.') || f.filename.includes('/.');
              return (isYaml || isDotFile) && (isRoot || isInDotFolder);
            })) {
              spamScore += 20;
            }
            // Miniscule edits to README.md are often low-effort spam
            if (files.length === 1 && files[0].filename === 'README.md' && (files[0].additions + files[0].deletions) < 5) spamScore += 20;
            
            // General triviality check (avoid double-penalizing maintainer files which have higher base scores)
            if (files.length <= 2 && maintainerFileCount === 0) {
              const totalChanges = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
              if (totalChanges < 5) spamScore += 30;
            }

            // Compliance violations contributing to spam score
            if (wrongBranch) spamScore += 15;
            if (aiMissing) spamScore += 15;
            if (affirmationMissing) spamScore += 15;
            if (dcoMissing) spamScore += 15;
            if (i18nModified) spamScore += 15;

            // Legitimate reference deduction
            if (/(?:closes|fixes|resolves)\s+#\d+/i.test(prBody)) spamScore -= 50;
            if (/#\d+/.test(title)) spamScore -= 30;

            const spamRating = Math.max(0, Math.min(100, spamScore));
            const isSpam = spamRating >= 75;

            const checkEmojis = [
              !wrongBranch ? '✅' : '❌',
              !aiMissing ? '✅' : '❌',
              !affirmationMissing ? '✅' : '❌',
              !dcoMissing ? '✅' : '❌',
              !i18nModified ? '✅' : '❌'
            ].join('');
            const spamPrefix = isSpam ? '🚨 ' : (spamRating >= 40 ? '⚠️ ' : '✅ ');
            core.setOutput('results', `${checkEmojis}${spamRating > 0 ? ` (${spamPrefix}Spam: ${spamRating}%)` : ''} - ${author}`);

            if (isSpam) {
              violations.push(
                '🚨 **Potential Spam Detected:** _This PR has been identified as potential spam (Rating: ' + spamRating + '/100) based on recurring indicators._ ' +
                'We sincerely appreciate your interest in OWASP Juice Shop, but we must focus our limited reviewer ' +
                'resources on meaningful contributions that significantly improve the project. Thank you for your understanding. ' +
                'See our [spam handling guide](https://pwning.owasp-juice.shop/companion-guide/latest/part3/contribution.html#_handling_of_spam_prs) for more details.'
              );
            }

            // Check target branch
            if (wrongBranch) {
              violations.push(
                '🎯 **Wrong target branch:** This PR targets the `master` branch. ' +
                'Per our [contributing guidelines](https://github.com/juice-shop/juice-shop/blob/develop/CONTRIBUTING.md), ' +
                'all PRs must be based on the `develop` branch. Please re-open this PR against `develop`.'
              );
            }

            // Check AI disclosure for violations
            if (aiMissing) {
              violations.push(
                '🤖 **Missing AI Tool Disclosure:** This PR is missing the required AI Tool Disclosure. ' +
                'Please check one of the AI disclosure boxes in the PR template.'
              );
            }

            // Check affirmation for violations
            if (affirmationMissing) {
              violations.push(
                '🧾 **Missing Affirmation:** This PR is missing the required affirmation that your code follows the ' +
                '[CONTRIBUTING.md](https://github.com/juice-shop/juice-shop/blob/develop/CONTRIBUTING.md) guidelines.'
              );
            }

            // Check DCO (Signed-off-by)
            if (dcoMissing) {
              violations.push(
                '✍️ **Missing DCO Sign-off:** All commits in this PR must be signed off to indicate your agreement ' +
                'with the [Developer Certificate of Origin](https://developercertificate.org/). ' +
                'Please use `git commit -s` for all your commits.'
              );
            }

            // Check for translation file changes violation
            if (i18nModified) {
              violations.push(
                '🌐 **Direct I18N Modification:** Translations must be contributed via ' +
                '[Crowdin](https://crowdin.com/project/owasp-juice-shop) and not via GitHub PRs. ' +
                'Please see our [translation guidelines](https://pwning.owasp-juice.shop/companion-guide/latest/part3/translation.html) for more details.'
              );
            }

            if (violations.length === 0) {
              console.log('All compliance checks passed.');
              return;
            }

            const header = 'Unfortunately, this PR does not meet our contributing guidelines and has been closed:';
            const violationsList = violations.map(v => '- ' + v).join('\n');
            let comment = '';

            if (isSpam) {
              comment = [
                header,
                '',
                violationsList
              ].join('\n');
            } else {
              comment = [
                'Hi @' + author + ', thank you for your contribution! :raised_hands:',
                '',
                header,
                '',
                violationsList,
                '',
                'Please address the above and open a new PR. If you have questions, check our ' +
                '[contributing guidelines](https://github.com/juice-shop/juice-shop/blob/develop/CONTRIBUTING.md) '
              ].join('\n');
            }

            const labels = ['invalid'];
            if (isSpam) labels.push('spam');

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: labels
            });

            if (isSpam) {
              const orgAdminToken = process.env.ORG_ADMIN_TOKEN;
              if (orgAdminToken) {
                try {
                  const response = await fetch(`https://api.github.com/orgs/juice-shop/blocks/${encodeURIComponent(author)}`, {
                    method: 'PUT',
                    headers: {
                      'Authorization': `Bearer ${orgAdminToken}`,
                      'Accept': 'application/vnd.github+json',
                      'User-Agent': 'actions/github-script'
                    }
                  });
                  if (response.ok) {
                    console.log(`User ${author} blocked due to spam.`);
                  } else {
                    const errorText = await response.text();
                    console.log(`Failed to block user ${author}: ${response.status} ${errorText}`);
                  }
                } catch (e) {
                  console.log(`Failed to block user ${author}: ${e.message}`);
                }
              } else {
                console.log('ORG_ADMIN_TOKEN secret not configured, skipping user block.');
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: 'closed'
            });

            console.log(`PR #${pr.number} closed due to ${violations.length} compliance violation(s).`);
      - name: "Slack Notification"
        if: always() && steps.check.outputs.results
        uses: Gamesight/slack-workflow-status@68bf00d0dbdbcb206c278399aa1ef6c14f74347a #v1.3.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          name: "PR Compliance: ${{ steps.check.outputs.results }}"

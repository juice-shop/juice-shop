name: SBOM and Signing

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign generated SBOM with keyless Cosign"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate CycloneDX SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom/syft-cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: syft-cyclonedx-sbom
          path: sbom/syft-cyclonedx.json

  sign-sbom:
    needs: sbom
    if: github.event_name == 'workflow_dispatch' && inputs.sign == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: syft-cyclonedx-sbom
          path: sbom

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM with keyless Cosign
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature sbom/syft-cyclonedx.sig \
            --output-certificate sbom/syft-cyclonedx.pem \
            sbom/syft-cyclonedx.json

      - name: Upload signing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syft-cyclonedx-signature
          path: |
            sbom/syft-cyclonedx.sig
            sbom/syft-cyclonedx.pem

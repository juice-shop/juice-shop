name: Sentinel SCA

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sentinel SCA
        run: npm install -g https://x-access-token:${{ secrets.DEPENDENCY_ACCESS_TOKEN }}@github.com/PrinceORavens/sentinel-sca.git

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          sentinel-sca scan --path . --output html --report-path sentinel-report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sentinel-report
          path: sentinel-report.html

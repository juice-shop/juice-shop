name: Sentinel SCA

on:
  push:
    branches: [main, master]
    paths:
      - 'package*.json'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      fail_on:
        description: 'Minimum severity to fail the build'
        required: false
        default: 'high'
        type: choice
        options: [critical, high, medium, low, none]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  sentinel-sca:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sentinel SCA
        env:
          DEPENDENCY_ACCESS_TOKEN: ${{ secrets.DEPENDENCY_ACCESS_TOKEN }}
        run: |
          git clone --depth 1 --branch main \
            https://x-access-token:${DEPENDENCY_ACCESS_TOKEN}@github.com/PrinceORavens/sentinel-sca.git \
            /tmp/sentinel-sca
          cd /tmp/sentinel-sca && npm install --omit=dev && npm link

      - name: Restore Sentinel SCA caches
        uses: actions/cache@v4
        with:
          # ~/.sentinel-sca   — OSV vulnerability result cache (24-hour TTL, global)
          # .sentinel-cache   — AI reachability + scan-level cache (7-day TTL, project-local)
          path: |
            ~/.sentinel-sca
            .sentinel-cache
          key: sentinel-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json', 'requirements*.txt', 'Pipfile.lock', 'poetry.lock', 'go.sum', 'Cargo.lock', 'pom.xml', 'build.gradle*', '*.csproj', 'Gemfile.lock', 'pubspec.lock', 'mix.lock') }}
          restore-keys: |
            sentinel-${{ runner.os }}-
          save-always: true
      - name: Run Sentinel SCA
        id: scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          sentinel-sca scan \
            --path . \
            --output html,sarif,github \
            --fail-on ${{ github.event.inputs.fail_on || 'high' }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sentinel-report.sarif
          category: sentinel-sca
        if: always()

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-sca-report
          path: sentinel-report.html
          retention-days: 30
        if: always()

      - name: Fail if blocking vulnerabilities found
        if: steps.scan.outcome == 'failure'
        run: exit 1

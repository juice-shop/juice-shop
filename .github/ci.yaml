name: CI Pipeline

on:
  workflow_call:
    inputs:
      # Obrigatórios
      language:
        required: true
        type: string
        description: "nodejs | python | java | terraform"
      repository:
        required: true
        type: string
        description: "Full repo name (owner/repo)"
      ref:
        required: false
        type: string
        default: ${{ github.head_ref || github.ref_name }}
      # Opcionais – build/test
      build_command:
        required: false
        type: string
        default: ""
      test_command:
        required: false
        type: string
        default: ""
      # Segurança
      fail_on_critical_high:
        required: false
        type: boolean
        default: true
      bypass_label:
        required: false
        type: string
        default: "security-bypass"
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

jobs:
  # --------------------------------------------------------------------------
  # 1. Build & Test (opcional, específico por linguagem)
  # --------------------------------------------------------------------------
  build-test:
    name: "🏗️ Build & Test (${{ inputs.language }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          path: source
          ref: ${{ inputs.ref }}

      - name: Setup environment
        run: |
          cd source
          case "${{ inputs.language }}" in
            nodejs)
              echo "NODE_VERSION=20" >> $GITHUB_ENV
              ;;
            python)
              echo "PYTHON_VERSION=3.12" >> $GITHUB_ENV
              ;;
            java)
              echo "JAVA_VERSION=17" >> $GITHUB_ENV
              ;;
            terraform)
              echo "TERRAFORM_VERSION=1.6" >> $GITHUB_ENV
              ;;
          esac

      - name: Setup Node.js
        if: inputs.language == 'nodejs'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: source/requirements.txt

      - name: Setup Java
        if: inputs.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Terraform
        if: inputs.language == 'terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'

      - name: Install dependencies
        working-directory: source
        run: |
          case "${{ inputs.language }}" in
            nodejs) npm ci ;;
            python) pip install -r requirements.txt ;;
            java)   # Maven or Gradle? Assume Maven
                    if [ -f pom.xml ]; then mvn dependency:resolve; fi ;;
            terraform) terraform init -backend=false ;;
          esac

      - name: Run build (if command provided)
        if: inputs.build_command != ''
        working-directory: source
        run: ${{ inputs.build_command }}

      - name: Run tests (if command provided)
        if: inputs.test_command != ''
        working-directory: source
        run: ${{ inputs.test_command }}

      - name: Upload test artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.language }}
          path: source/test-results/
          retention-days: 14

  # --------------------------------------------------------------------------
  # 2. SAST + Secrets (Semgrep)
  # --------------------------------------------------------------------------
  sast:
    name: "🔍 SAST (${{ inputs.language }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework (configs)
        uses: actions/checkout@v4
        with:
          path: framework

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          path: source
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            framework/config/semgrep/${{ inputs.language }}.yaml
            framework/config/semgrep/base.yaml
          generateSarif: "1"
          auditOn: push
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF (SAST)
        uses: actions/upload-artifact@v4
        with:
          name: sast-${{ inputs.language }}
          path: semgrep.sarif
          retention-days: 30

  # --------------------------------------------------------------------------
  # 3. SCA + IaC + Secrets (Trivy)
  # --------------------------------------------------------------------------
  sca:
    name: "📦 SCA & IaC (${{ inputs.language }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@v4
        with:
          path: framework

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          path: source
          ref: ${{ inputs.ref }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: source
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"
          trivy-config: framework/config/trivy/trivy.yaml
          ignorefile: framework/config/trivy/.trivyignore
          scanners: vuln,secret,config

      - name: Trivy config scan (only for Terraform)
        if: inputs.language == 'terraform'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: source
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          trivy-config: framework/config/trivy/trivy.yaml

      - name: Upload SARIF (SCA)
        uses: actions/upload-artifact@v4
        with:
          name: sca-${{ inputs.language }}
          path: |
            trivy-fs.sarif
            trivy-config.sarif
          retention-days: 30

  # --------------------------------------------------------------------------
  # 4. Gate (Security verdict)
  # --------------------------------------------------------------------------
  gate:
    name: "🚦 Security Gate"
    runs-on: ubuntu-latest
    needs: [sast, sca]
    if: always()
    steps:
      - name: Download all SARIFs
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Check for bypass label (only on PRs)
        id: bypass
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, inputs.bypass_label) }}" == "true" ]]; then
            echo "bypass=true" >> $GITHUB_OUTPUT
          else
            echo "bypass=false" >> $GITHUB_OUTPUT
          fi

      - name: Evaluate findings
        if: steps.bypass.outputs.bypass != 'true' && inputs.fail_on_critical_high == true
        run: |
          python framework/scripts/gate.py all-reports/**/*.sarif

  # --------------------------------------------------------------------------
  # 5. Consolidated Report (optional, useful for manual runs)
  # --------------------------------------------------------------------------
  report:
    name: "📄 Security Report"
    needs: [sast, sca]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: framework
      - uses: actions/download-artifact@v4
        with:
          path: all-reports
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate report
        run: python framework/scripts/report.py all-reports
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            report.md
            report.json
      - name: Write job summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY